services:
  redis:
    image: redis:7-alpine
    expose:
      - 6739
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - 8080
    environment:
      REDIS_ADDR: "redis:6379"
      PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data: